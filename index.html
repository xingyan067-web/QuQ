<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuQ - 个人文件存储</title>
    <!-- 引入思源宋体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <!-- 引入 Mammoth.js 用于解析 .docx 文件 -->
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root {
            --font-family: 'Noto Serif SC', serif;
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #dddddd;
            --secondary-text-color: #666666;
            --button-hover-bg: #f5f5f5;
        }

        /* --- 全局与基础样式 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            line-height: 1.7;
            padding: 20px;
        }

        /* --- 登录界面 --- */
        #login-screen {
            max-width: 400px;
            margin: 10vh auto 0;
            text-align: center;
        }

        #login-screen h1 {
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        #login-screen p {
            font-size: 14px;
            color: var(--secondary-text-color);
            margin-bottom: 40px;
        }

        input[type="text"],
        input[type="number"] {
            font-family: var(--font-family);
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 16px;
            background: var(--bg-color);
            color: var(--text-color);
        }
        input:focus {
            outline: none;
            border-color: #000;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }


        button {
            font-family: var(--font-family);
            padding: 12px 20px;
            font-size: 16px;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--text-color);
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        button:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
        
        #login-button {
            width: 100%;
        }

        /* --- 主界面 --- */
        #main-screen {
            max-width: 800px;
            margin: 0 auto;
            display: none; /* 默认隐藏 */
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 36px;
            font-weight: 600;
        }

        #search-box {
            width: 100%;
            margin-bottom: 30px;
        }
        
        /* --- 添加新项目区域 --- */
        #add-item-section {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 40px;
        }
        
        #add-item-section h2 {
            font-weight: 600;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--secondary-text-color);
        }

        #add-item-section input[type="file"] {
            border: none;
            padding: 0;
        }

        #preview-area {
            margin-top: 15px;
            padding: 10px;
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            display: none;
        }
        
        #preview-content {
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 14px;
            color: var(--secondary-text-color);
            background: #fafafa;
            padding: 10px;
        }
        
        /* --- 文件列表 --- */
        #file-list-container {
            margin-top: 20px;
        }

        .file-item {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .file-item h3 {
            font-weight: 600;
            margin-bottom: 10px;
            padding-right: 40px; /* 为删除按钮留出空间 */
        }

        .item-content-wrapper {
            max-height: 100px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .item-content-wrapper.expanded {
            max-height: none;
        }

        .item-content-wrapper::after {
            content: '... [点击展开]';
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--bg-color);
            padding: 0 5px;
            font-size: 14px;
            color: var(--secondary-text-color);
        }

        .item-content-wrapper.expanded::after {
            content: '[点击收起]';
        }

        .item-content {
            white-space: pre-wrap;
            word-break: break-all;
        }

        .item-tags {
            margin-bottom: 15px;
        }

        .text-tag {
            display: inline-block;
            background-color: #f0f0f0;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 13px;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        
        .image-tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .image-tag {
            max-width: 100px;
            max-height: 100px;
            object-fit: cover;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .item-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            border: none;
            background: none;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
            padding: 0; /* 修正按钮样式 */
        }
        .delete-btn:hover {
            color: #000;
            background: none; /* 修正按钮样式 */
        }
    </style>
</head>
<body>

    <!-- 登录界面 -->
    <div id="login-screen">
        <h1>QuQ</h1>
        <p>个人文件存储库</p>
        <div class="input-group">
            <input type="number" id="qq-input" placeholder="输入QQ号">
        </div>
        <div class="input-group">
            <input type="text" id="code-input" placeholder="输入激活码">
        </div>
        <!-- 移除了 onclick 事件 -->
        <button id="login-button">登录</button>
    </div>

    <!-- 主界面 -->
    <div id="main-screen">
        <header>
            <h1>QuQ</h1>
            <!-- 移除了 onclick 事件 -->
            <button id="logout-button">登出</button>
        </header>

        <div id="search-box">
            <input type="text" id="search-input" placeholder="按文字标签搜索...">
        </div>
        
        <div id="add-item-section">
            <h2>添加新项目</h2>
            <div class="input-group">
                <label for="file-upload">1. 上传文件 (.docx, .txt, .json)</label>
                <input type="file" id="file-upload" accept=".docx,.txt,.json">
            </div>

            <div id="preview-area">
                <p>文件内容预览:</p>
                <div id="preview-content"></div>
            </div>
            
            <div class="input-group">
                <label for="text-tags-input">2. 添加文字备注/标签 (用逗号,隔开)</label>
                <input type="text" id="text-tags-input" placeholder="例如: 笔记, 项目A, 重要">
            </div>

            <div class="input-group">
                <label for="image-tags-upload">3. (可选) 上传图片备注</label>
                <input type="file" id="image-tags-upload" accept="image/*" multiple>
            </div>

            <!-- 移除了 onclick 事件 -->
            <button id="add-item-button">保存新项目</button>
        </div>
        
        <div id="file-list-container">
            <h2>已存项目</h2>
            <div id="file-list"></div>
        </div>

    </div>

    <script>
    // 使用 DOMContentLoaded 来确保所有HTML元素都加载完毕再执行脚本
    document.addEventListener('DOMContentLoaded', function() {

        const DOM = {
            loginScreen: document.getElementById('login-screen'),
            mainScreen: document.getElementById('main-screen'),
            qqInput: document.getElementById('qq-input'),
            codeInput: document.getElementById('code-input'),
            loginButton: document.getElementById('login-button'),
            logoutButton: document.getElementById('logout-button'),
            
            fileUpload: document.getElementById('file-upload'),
            previewArea: document.getElementById('preview-area'),
            previewContent: document.getElementById('preview-content'),
            textTagsInput: document.getElementById('text-tags-input'),
            imageTagsUpload: document.getElementById('image-tags-upload'),
            addItemButton: document.getElementById('add-item-button'),

            searchInput: document.getElementById('search-input'),
            fileList: document.getElementById('file-list'),
        };

        let fileData = {
            name: null,
            content: null
        };
        let imageTagsData = [];
        let allItems = [];

        // --- 核心验证逻辑 (必须与 admin.html 完全一致) ---
        function generateCodeForQQ(qq) {
            const salt = "HONEY-STUDIO-V2-SECRET-20260309";
            const baseString = `${qq}#${salt}`;
            let hash = 0;
            for (let i = 0; i < baseString.length; i++) {
                const char = baseString.charCodeAt(i);
                hash = ((hash << 7) - hash) + char;
                hash |= 0;
            }
            hash = Math.abs(hash);
            const hexHash = hash.toString(16).toUpperCase();
            const qqInfo = `${qq.length}${qq.slice(-2)}`;
            const finalCode = `V2-${qqInfo}-${hexHash}`.substring(0, 16);
            return finalCode;
        }

        // --- 登录与认证 ---
        function handleLogin() {
            const qq = DOM.qqInput.value.trim();
            const code = DOM.codeInput.value.trim();
            if (!qq || !code) {
                alert('请输入QQ号和激活码。');
                return;
            }
            
            const expectedCode = generateCodeForQQ(qq);
            if (code === expectedCode) {
                localStorage.setItem('quq_user', JSON.stringify({ qq, code }));
                showMainScreen();
            } else {
                alert('QQ号或激活码错误。');
            }
        }

        function handleLogout() {
            if (confirm('确定要登出吗？本地数据将保留，但需要重新登录。')) {
                localStorage.removeItem('quq_user');
                window.location.reload();
            }
        }
        
        function checkLogin() {
            const userData = localStorage.getItem('quq_user');
            if (userData) {
                try {
                    const { qq, code } = JSON.parse(userData);
                    if (qq && code && code === generateCodeForQQ(qq)) {
                        showMainScreen();
                        return;
                    }
                } catch (e) {
                    // 解析失败，忽略
                }
            }
            DOM.loginScreen.style.display = 'block';
            DOM.mainScreen.style.display = 'none';
        }

        function showMainScreen() {
            DOM.loginScreen.style.display = 'none';
            DOM.mainScreen.style.display = 'block';
            loadAllItems();
        }

        // --- 文件处理 ---
        function handleFileChange(event) {
            const file = event.target.files[0];
            if (!file) return;

            fileData.name = file.name;
            const reader = new FileReader();
            
            const extension = file.name.split('.').pop().toLowerCase();
            
            if (extension === 'txt' || extension === 'json') {
                reader.onload = (e) => {
                    fileData.content = e.target.result;
                    showPreview(fileData.content);
                };
                reader.readAsText(file);
            } else if (extension === 'docx') {
                if(typeof mammoth === 'undefined') {
                    alert('解析 .docx 的组件加载失败，请检查网络连接或刷新页面。');
                    return;
                }
                reader.onload = (e) => {
                    mammoth.extractRawText({ arrayBuffer: e.target.result })
                        .then(result => {
                            fileData.content = result.value;
                            showPreview(fileData.content);
                        })
                        .catch(err => {
                            console.error(err);
                            alert('解析DOCX文件失败。');
                        });
                };
                reader.readAsArrayBuffer(file);
            } else {
                alert('不支持的文件类型。请选择 .docx, .txt 或 .json');
                resetAddForm();
            }
        }

        function showPreview(content) {
            DOM.previewContent.textContent = content;
            DOM.previewArea.style.display = 'block';
        }

        // --- 图片标签处理 ---
        function handleImageTagsChange(event) {
            const files = event.target.files;
            imageTagsData = []; // 重置
            if (files.length > 5) {
                alert("一次最多上传5张图片备注。");
                DOM.imageTagsUpload.value = ''; // 清空选择
                return;
            }
            if (files.length === 0) return;

            let processedImages = 0;
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    imageTagsData.push(e.target.result); // Base64 string
                    processedImages++;
                    if(processedImages === files.length) {
                        alert(`已选择 ${files.length} 张图片。`);
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        // --- 数据增删改查 ---
        function handleAddItem() {
            if (!fileData.content) {
                alert('请先上传并解析一个文件。');
                return;
            }

            const textTags = DOM.textTagsInput.value.trim()
                .split(/,|，/)
                .map(tag => tag.trim())
                .filter(tag => tag);
                
            const newItem = {
                id: Date.now(),
                fileName: fileData.name,
                content: fileData.content,
                textTags: textTags,
                imageTags: imageTagsData,
                createdAt: new Date().toLocaleString()
            };

            allItems.unshift(newItem);
            saveAllItems();
            renderFileList(allItems);
            resetAddForm();
        }
        
        function handleDeleteItem(id) {
            if (confirm('确定要删除这个项目吗？此操作无法撤销。')) {
                allItems = allItems.filter(item => item.id !== id);
                saveAllItems();
                // 重新渲染当前视图（可能是搜索后的视图）
                handleSearch();
            }
        }

        function resetAddForm() {
            DOM.fileUpload.value = '';
            DOM.previewArea.style.display = 'none';
            DOM.previewContent.textContent = '';
            DOM.textTagsInput.value = '';
            DOM.imageTagsUpload.value = '';
            fileData = { name: null, content: null };
            imageTagsData = [];
        }

        function loadAllItems() {
            const storedItems = localStorage.getItem('quq_data');
            allItems = storedItems ? JSON.parse(storedItems) : [];
            renderFileList(allItems);
        }

        function saveAllItems() {
            localStorage.setItem('quq_data', JSON.stringify(allItems));
        }
        
        // --- 渲染与显示 ---
        function renderFileList(itemsToRender) {
            DOM.fileList.innerHTML = '';
            if (itemsToRender.length === 0) {
                DOM.fileList.innerHTML = '<p style="color: #666; text-align: center;">暂无项目。开始添加你的第一个吧！</p>';
                return;
            }
            itemsToRender.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'file-item';
                itemDiv.setAttribute('data-id', item.id); // 添加 data-id 属性
                itemDiv.innerHTML = `
                    <button class="delete-btn">&times;</button>
                    <h3>${item.fileName} <span style="font-size: 12px; color: #666; font-weight: 400;">(${item.createdAt})</span></h3>
                    
                    <div class="item-tags">
                        ${item.textTags.map(tag => `<span class="text-tag">${tag}</span>`).join('')}
                    </div>
                    
                    <div class="image-tag-container">
                        ${item.imageTags.map(imgData => `<img src="${imgData}" class="image-tag" alt="图片备注">`).join('')}
                    </div>

                    <div class="item-content-wrapper">
                        <div class="item-content">${item.content}</div>
                    </div>
                    
                    <div class="item-actions">
                        <button class="copy-btn">复制文本</button>
                    </div>
                `;
                DOM.fileList.appendChild(itemDiv);
            });
        }
        
        function copyToClipboard(button, id) {
            const item = allItems.find(i => i.id === id);
            if (item) {
                navigator.clipboard.writeText(item.content).then(() => {
                    const originalText = button.textContent;
                    button.textContent = '已复制!';
                    setTimeout(() => { button.textContent = originalText; }, 2000);
                }).catch(err => {
                    alert('复制失败: ' + err);
                });
            }
        }
        
        // --- 搜索 ---
        function handleSearch() {
            const searchTerm = DOM.searchInput.value.trim().toLowerCase();
            if (!searchTerm) {
                renderFileList(allItems);
                return;
            }
            const filteredItems = allItems.filter(item => {
                return item.textTags.some(tag => tag.toLowerCase().includes(searchTerm));
            });
            renderFileList(filteredItems);
        }

        // --- 全局事件委托 ---
        DOM.fileList.addEventListener('click', function(e) {
            const target = e.target;
            const fileItem = target.closest('.file-item');
            if (!fileItem) return;

            const itemId = Number(fileItem.dataset.id);

            // 删除按钮
            if (target.classList.contains('delete-btn')) {
                handleDeleteItem(itemId);
            }
            // 复制按钮
            else if (target.classList.contains('copy-btn')) {
                copyToClipboard(target, itemId);
            }
            // 展开/收起
            else if (target.closest('.item-content-wrapper')) {
                target.closest('.item-content-wrapper').classList.toggle('expanded');
            }
        });

        // --- 绑定所有事件监听器 ---
        DOM.loginButton.addEventListener('click', handleLogin);
        DOM.logoutButton.addEventListener('click', handleLogout);
        DOM.addItemButton.addEventListener('click', handleAddItem);
        
        DOM.fileUpload.addEventListener('change', handleFileChange);
        DOM.imageTagsUpload.addEventListener('change', handleImageTagsChange);
        
        DOM.searchInput.addEventListener('input', handleSearch);

        // --- 页面初始化 ---
        checkLogin();
    });
    </script>
</body>
</html>
